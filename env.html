<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="color-scheme" content="light" />
  <title>Yinspire Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --radius-g2: 8px;
      --chrome-bg: #e8e8ed;
      --chrome-bg-top: #f5f5f7;
      --surface: #ffffff;
      --surface-canvas: #fafaf9;
      --surface-elevated: #fafaf9;
      --separator: rgba(60, 60, 67, 0.16);
      --separator-subtle: rgba(60, 60, 67, 0.08);
      --label-primary: rgba(0, 0, 0, 0.88);
      --label-secondary: rgba(60, 60, 67, 0.62);
      --label-tertiary: rgba(60, 60, 67, 0.48);
      --fill-quaternary: rgba(116, 116, 128, 0.1);
      --fill-hover: rgba(116, 116, 128, 0.14);
      --accent-blue: #007aff;
      --accent-run: #1d1d1f;
      --error: #d70015;
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, "Cascadia Mono", "Cascadia Code", Menlo, monospace;
      --ghost-rail: 44px;
      --radius-window: var(--radius-g2);
      --shadow-window: 0 0 0 0.5px rgba(0, 0, 0, 0.06), 0 22px 48px -16px rgba(0, 0, 0, 0.18),
        0 8px 16px -8px rgba(0, 0, 0, 0.1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    @supports (corner-shape: squircle) {
      html {
        corner-shape: squircle;
      }
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.47;
      letter-spacing: -0.01em;
      color: var(--label-primary);
      background: var(--chrome-bg);
      background-image: linear-gradient(180deg, var(--chrome-bg-top) 0%, var(--chrome-bg) 100%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .player-topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 4px 12px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--label-primary);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.96);
      z-index: 200;
    }

    .player-topbar__wordmark {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #1d1d1f;
      text-decoration: none;
    }

    .player-topbar__wordmark:hover {
      opacity: 0.72;
    }

    .player-topbar__nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 16px 20px;
    }

    .player-topbar__nav a {
      color: #007aff;
      text-decoration: none;
      font-weight: 400;
    }

    .player-topbar__nav a:hover {
      text-decoration: underline;
    }

    .player-topbar__nav a:focus-visible {
      outline: 2px solid #007aff;
      outline-offset: 2px;
      border-radius: var(--radius-g2);
    }

    .shell {
      flex: 1;
      min-height: 0;
      height: auto;
      max-height: 100%;
      border-radius: var(--radius-window);
      overflow: hidden;
      box-shadow: var(--shadow-window);
      background: var(--surface);
    }

    .player-leave-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .player-leave-modal[hidden] {
      display: none !important;
    }

    .player-leave-modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    .player-leave-modal__panel {
      position: relative;
      width: min(360px, 100%);
      padding: 28px 26px 22px;
      border-radius: var(--radius-g2);
      background: #ffffff;
      box-shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.35);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .player-leave-modal__msg {
      margin: 0 0 22px;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: -0.01em;
      color: #1d1d1f;
    }

    .player-leave-modal__actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .player-leave-modal__btn {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 400;
      padding: 10px 18px;
      border-radius: var(--radius-g2);
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: #ffffff;
      color: #1d1d1f;
      cursor: pointer;
    }

    .player-leave-modal__btn--primary {
      background: #1d1d1f;
      color: #ffffff;
      border-color: #1d1d1f;
    }

    .player-leave-modal__btn:focus-visible {
      outline: 2px solid #007aff;
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: auto minmax(260px, 1fr) minmax(300px, 1fr);
      height: 100%;
      min-height: 0;
      background: var(--surface-canvas);
      gap: 0;
      transition: grid-template-columns 0.32s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .ghost-shell {
      position: relative;
      z-index: 50;
      display: flex;
      flex-direction: row;
      align-self: stretch;
      min-height: 0;
      width: var(--ghost-rail);
      flex-shrink: 0;
      background: var(--surface-canvas);
      box-shadow: 6px 0 32px -28px rgba(0, 0, 0, 0.18);
    }

    .ghost-rail {
      width: var(--ghost-rail);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 0;
    }

    .ghost-rail__btn {
      width: 36px;
      height: 36px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: var(--radius-g2);
      background: transparent;
      color: var(--label-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);
    }

    .ghost-rail__btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .ghost-rail__btn:hover,
    .ghost-rail__btn:focus-visible {
      background: rgba(0, 0, 0, 0.05);
      color: var(--label-primary);
    }

    .ghost-rail__btn:active {
      transform: scale(0.96);
    }

    .ghost-rail__btn:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 2px;
    }

    .ghost-drawer {
      position: absolute;
      left: 100%;
      top: 0;
      bottom: 0;
      width: min(320px, calc(100vw - 48px));
      background: rgba(252, 252, 251, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 16px 0 48px -32px rgba(0, 0, 0, 0.14);
      opacity: 0;
      visibility: hidden;
      transform: translateX(-8px);
      pointer-events: none;
      transition: opacity 0.24s var(--ease), transform 0.24s var(--ease), visibility 0.24s;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .ghost-shell:has(#ghostForgeTrigger:hover) .ghost-drawer--forge,
    .ghost-shell:has(#ghostForgeTrigger:focus-visible) .ghost-drawer--forge,
    .ghost-shell:has(.ghost-drawer--forge:hover) .ghost-drawer--forge,
    .ghost-shell:has(#ghostGalleryTrigger:hover) .ghost-drawer--gallery,
    .ghost-shell:has(#ghostGalleryTrigger:focus-visible) .ghost-drawer--gallery,
    .ghost-shell:has(.ghost-drawer--gallery:hover) .ghost-drawer--gallery {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
      pointer-events: auto;
    }

    .ghost-drawer__inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .ghost-drawer--forge .forge-body {
      flex: 1;
      min-height: 0;
    }

    .ghost-drawer--gallery .forge-section--gallery {
      flex: 1;
      min-height: 0;
      max-height: none;
      border-top: none;
    }

    .ghost-drawer--gallery .ghost-drawer__inner {
      padding-bottom: 8px;
    }

    .app.app--presentation {
      grid-template-columns: var(--ghost-rail) minmax(240px, min(340px, 38vw)) minmax(280px, 1fr);
    }

    .app.app--presentation .ghost-shell {
      opacity: 1;
      pointer-events: auto;
      overflow: visible;
      width: var(--ghost-rail);
      min-width: var(--ghost-rail);
    }

    .app.app--presentation .editors {
      opacity: 1;
      pointer-events: auto;
      overflow: hidden;
      width: auto;
      min-width: 0;
      max-width: min(340px, 38vw);
      border-right: 1px solid var(--separator-subtle);
      display: flex;
      flex-direction: column;
    }

    .app.app--presentation .editors .editor-block {
      display: none !important;
    }

      .app.app--presentation #xray-card.xray-card--visible {
        background: rgba(252, 252, 251, 0.42);
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 12px 40px -20px rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .app.app--presentation #xray-card .xray-card__head {
        display: none !important;
      }

      .app.app--presentation #xray-card .xray-cc > *:not(.xray-cc__verdict) {
        display: none !important;
      }

      .app.app--presentation #xray-card .xray-cc__verdict > *:not([data-xray="verdict-score"]):not([data-xray="verdict-split-wrap"]) {
        display: none !important;
      }

      .app.app--presentation #xray-card .xray-cc__verdict-split,
      .app.app--presentation #xray-card [data-xray="verdict-split-wrap"] {
        display: none !important;
      }

      .app.app--presentation #xray-card [data-xray="verdict-score"] {
        font-size: clamp(28px, 7vw, 52px);
        font-weight: 600;
        letter-spacing: -0.045em;
        font-family: system-ui, -apple-system, "Helvetica Neue", sans-serif;
      }

    @media (max-width: 720px) {
      .app.app--presentation {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
      }

      .app.app--presentation .ghost-shell,
      .app.app--presentation .editors {
        opacity: 1;
        pointer-events: auto;
        width: 100%;
        max-width: none;
        border-right: none;
      }

      .app.app--presentation .editors {
        border-bottom: 1px solid var(--separator-subtle);
      }
    }

    .split-slot-select {
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      max-width: 140px;
      padding: 4px 8px;
      border-radius: var(--radius-g2);
      border: 1px solid var(--separator);
      background: var(--surface);
      color: var(--label-secondary);
    }

    .split-slot-select:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .viewport-fit.viewport-fit--split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: stretch;
      justify-items: stretch;
      padding: 0;
    }

    .viewport-fit.viewport-fit--split .viewport-pane:first-child {
      box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.04);
    }

    .viewport-pane {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .viewport-pane__label {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(60, 60, 67, 0.45);
      padding: 4px 8px 2px;
      pointer-events: none;
      display: none;
    }

    .viewport-fit.viewport-fit--split .viewport-pane__label {
      display: block;
    }

    .viewport-pane--b .viewport-scaler {
      flex: 1;
      min-height: 0;
    }

    .spec-print-sheet {
      display: none;
      padding: 48px 56px;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1d1d1f;
      background: #fff;
    }

    .spec-print-sheet h1 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 0 24px;
      color: rgba(60, 60, 67, 0.55);
    }

    .spec-print-sheet .spec-row {
      border-bottom: 1px solid rgba(60, 60, 67, 0.12);
      padding: 12px 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .spec-print-sheet .spec-k {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(60, 60, 67, 0.45);
      margin-bottom: 4px;
    }

    .spec-print-sheet .spec-mono {
      font-family: var(--font-mono);
      font-size: 11px;
      word-break: break-word;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #specPrintSheet,
      #specPrintSheet * {
        visibility: visible;
      }

      #specPrintSheet {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        min-height: 100%;
      }

      .shell,
      #xray-card,
      #yinspire-toast {
        display: none !important;
      }
    }

    .panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      min-width: 0;
      padding: 0 20px;
      border-bottom: none;
      flex-shrink: 0;
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }

    .brand {
      display: block;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.022em;
      color: var(--label-primary);
      line-height: 1.35;
      padding: 4px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      max-width: 100%;
    }

    .panel-header__brand-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 120px;
      overflow: hidden;
    }

    .engine-bridge-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(60, 60, 67, 0.2);
      transition: background 0.35s var(--ease), box-shadow 0.35s var(--ease), transform 0.35s var(--ease);
    }

    .engine-bridge-indicator--live {
      background: #34c759;
      box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.22);
      animation: engineBridgePulse 2.2s ease-in-out infinite;
    }

    @keyframes engineBridgePulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.18);
        opacity: 0.88;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .engine-bridge-indicator--live {
        animation: none;
      }
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
      flex: 0 1 auto;
      flex-shrink: 0;
      min-width: 0;
      margin-left: auto;
    }

    .btn--icon {
      padding: 8px;
      min-width: 36px;
      min-height: 36px;
      border-radius: var(--radius-g2);
    }

    .btn--icon svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .editor-run-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-g2);
    }

    .editor-run-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .btn {
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      border: none;
      border-radius: 980px;
      padding: 6px 14px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s var(--ease), transform 0.15s var(--ease),
        opacity 0.2s var(--ease);
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 2px;
    }

    .btn--secondary {
      color: var(--accent-blue);
      background: transparent;
    }

    .btn--secondary:hover {
      background: var(--fill-quaternary);
    }

    .btn--secondary:active {
      opacity: 0.75;
    }

    .btn--primary {
      color: #fff;
      background: var(--accent-run);
      padding-left: 16px;
      padding-right: 16px;
    }

    .btn--primary:hover {
      background: #2c2c2e;
    }

    .btn--primary:active {
      transform: scale(0.98);
    }

    @media (prefers-reduced-motion: reduce) {
      .btn {
        transition: none;
      }
    }

    .editors {
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: opacity 0.28s var(--ease);
      container-type: inline-size;
      container-name: editors;
    }

    @container editors (max-width: 420px) {
      .panel-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .panel-header__brand-wrap {
        flex: none;
        width: 100%;
      }

      .toolbar-actions {
        flex: none;
        width: 100%;
        margin-left: 0;
        justify-content: flex-end;
      }
    }

    .shell.shell--preview-focus .editors {
      opacity: 0.42;
    }

    .shell.shell--preview-focus .editors:focus-within {
      opacity: 1;
    }

    .editor-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-bottom: none;
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.035);
    }

    .editor-block:last-child {
      box-shadow: none;
    }

    .editor-block--js {
      position: relative;
      padding-bottom: 0;
    }

    .editor-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--label-tertiary);
      padding: 12px 20px 6px;
      flex-shrink: 0;
    }

    .editor-block textarea {
      flex: 1;
      width: 100%;
      min-height: 0;
      margin: 0;
      padding: 12px 20px 18px;
      border: none;
      resize: none;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.6;
      tab-size: 2;
      color: var(--label-primary);
      background: var(--surface-elevated);
      outline: none;
      transition: background-color 0.2s var(--ease);
    }

    .editor-block textarea:focus {
      background: var(--surface);
    }

    .editor-block textarea::placeholder {
      color: rgba(60, 60, 67, 0.35);
    }

    .editor-block textarea::-webkit-scrollbar {
      width: 9px;
      height: 9px;
    }

    .editor-block textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    .editor-block textarea::-webkit-scrollbar-thumb {
      background: rgba(60, 60, 67, 0.28);
      border-radius: 100px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .editor-block textarea::-webkit-scrollbar-thumb:hover {
      background: rgba(60, 60, 67, 0.4);
      background-clip: padding-box;
    }

    .preview-wrap {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      min-width: 0;
      padding: 0 20px;
      border-bottom: none;
      flex-shrink: 0;
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }

    .preview-toolbar__left {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
      flex: 1 1 0%;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .preview-toolbar__right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .preview-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--label-tertiary);
      line-height: 1.5;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .preview-hint {
      font-size: 12px;
      font-weight: 500;
      color: var(--label-secondary);
      letter-spacing: -0.01em;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewport-switcher {
      display: inline-flex;
      align-items: center;
      padding: 2px;
      border-radius: var(--radius-g2);
      border: none;
      background: rgba(29, 29, 31, 0.05);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
      gap: 1px;
    }

    .viewport-switcher__btn {
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 9px;
      border: none;
      border-radius: var(--radius-g2);
      background: transparent;
      color: var(--label-secondary);
      cursor: pointer;
      transition: background-color 0.18s var(--ease), color 0.18s var(--ease);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .viewport-switcher__btn svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .viewport-switcher__btn--icon-only {
      font-size: 0;
      letter-spacing: 0;
      padding: 7px 9px;
    }

    .viewport-switcher__btn:hover {
      color: var(--label-primary);
      background: rgba(0, 0, 0, 0.04);
    }

    .viewport-switcher__btn[aria-checked="true"] {
      color: #fff;
      background: var(--accent-run);
    }

    .viewport-switcher__btn:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 2px;
    }

    .frame-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--surface-canvas);
      box-shadow: none;
    }

    .device-status-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 28px;
      padding: 0 14px;
      border-bottom: none;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: rgba(60, 60, 67, 0.55);
    }

    .device-status-bar[hidden] {
      display: none;
    }

    .device-status-bar__time {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
    }

    .device-status-bar__dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .device-status-bar__dots i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(60, 60, 67, 0.28);
    }

    .viewport-fit {
      flex: 1;
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      align-items: stretch;
      justify-items: stretch;
      overflow: hidden;
    }

    .viewport-scaler {
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
      display: flex;
      justify-content: center;
      align-items: stretch;
      transform-origin: top center;
      transition: transform 0.38s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform;
    }

    .viewport-device {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 0;
      min-width: 0;
      transition: width 0.38s cubic-bezier(0.25, 0.1, 0.25, 1), box-shadow 0.32s var(--ease);
      box-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.06), 0 18px 42px -22px rgba(0, 0, 0, 0.2);
      border-radius: 0;
      background: #fff;
    }

    .viewport-device.viewport-device--framed {
      border-radius: var(--radius-g2);
      overflow: hidden;
    }

    .viewport-device iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
      z-index: 1;
    }

    .swiss-grid-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      --swiss-track: 80px;
      --swiss-gutter: 24px;
      --swiss-baseline: 8px;
      background-image: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--swiss-baseline) - 1px),
          rgba(60, 60, 67, 0.045) calc(var(--swiss-baseline) - 1px),
          rgba(60, 60, 67, 0.045) var(--swiss-baseline)
        ),
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--swiss-track) - 1px),
          rgba(60, 60, 67, 0.065) calc(var(--swiss-track) - 1px),
          rgba(60, 60, 67, 0.065) var(--swiss-track),
          transparent var(--swiss-track),
          transparent calc(var(--swiss-track) + var(--swiss-gutter))
        );
      background-size: 100% 100%, calc(var(--swiss-track) + var(--swiss-gutter)) 100%;
      opacity: 1;
    }

    .swiss-grid-overlay[hidden] {
      display: none;
    }

    .forge-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .forge-search {
      padding: 14px 14px 10px;
      flex-shrink: 0;
      border-bottom: none;
    }

    .forge-search input {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      font-size: 12px;
      padding: 9px 12px;
      border-radius: var(--radius-g2);
      border: none;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
      outline: none;
      transition: box-shadow 0.2s var(--ease), background 0.2s var(--ease);
    }

    .forge-search input:focus {
      box-shadow: 0 0 0 1px rgba(0, 122, 255, 0.35);
      background: #fff;
    }

    .forge-section__label {
      padding: 8px 14px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--label-tertiary);
    }

    .forge-section--gallery {
      border-top: none;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 42%;
    }

    .forge-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px 8px;
    }

    .forge-section__title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--label-tertiary);
    }

    .forge-mini-btn {
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: var(--radius-g2);
      border: none;
      background: var(--accent-run);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s var(--ease);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .forge-mini-btn:hover {
      opacity: 0.92;
    }

    .forge-mini-btn:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .forge-gallery {
      overflow: auto;
      padding: 0 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .forge-gallery__slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-g2);
      border: none;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
    }

    .forge-gallery__slot:hover {
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1), 0 6px 20px -12px rgba(0, 0, 0, 0.12);
      background: #fff;
    }

    .forge-gallery__slot:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .forge-gallery__slot-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--label-primary);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .forge-gallery__slot-meta {
      font-size: 10px;
      font-weight: 600;
      color: var(--label-tertiary);
      letter-spacing: 0.04em;
    }

    .forge-primitives-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .forge-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 8px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .forge-list::-webkit-scrollbar {
      width: 8px;
    }

    .forge-list::-webkit-scrollbar-thumb {
      background: rgba(60, 60, 67, 0.22);
      border-radius: 100px;
    }

    .forge-item {
      text-align: left;
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 11px 12px;
      border-radius: var(--radius-g2);
      border: none;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
      color: var(--label-primary);
      cursor: pointer;
      transition: border-color 0.18s var(--ease), background 0.18s var(--ease), transform 0.15s var(--ease);
    }

    .forge-item:hover {
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1), 0 6px 20px -12px rgba(0, 0, 0, 0.1);
      background: #fff;
    }

    .forge-item:active {
      transform: scale(0.99);
    }

    .forge-item:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .forge-item__name {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .forge-item__desc {
      font-size: 11px;
      font-weight: 500;
      color: var(--label-secondary);
      line-height: 1.35;
    }

    .forge-item[hidden] {
      display: none;
    }

    .error-panel {
      flex-shrink: 0;
      max-height: 30%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-top: none;
      background: rgba(255, 251, 251, 0.95);
      box-shadow: 0 -8px 32px -20px rgba(215, 0, 21, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .error-panel[hidden] {
      display: none;
    }

    .error-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--error);
      padding: 8px 16px 4px;
    }

    .error-log {
      margin: 0;
      padding: 0 16px 12px;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 11.5px;
      line-height: 1.45;
      color: var(--error);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-log::-webkit-scrollbar {
      width: 8px;
    }

    .error-log::-webkit-scrollbar-thumb {
      background: rgba(215, 0, 21, 0.25);
      border-radius: 100px;
    }

    .editor-run-strip {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 8px 12px 12px;
      background: linear-gradient(180deg, rgba(250, 250, 249, 0) 0%, var(--surface-canvas) 38%);
    }

    .editor-run-strip .btn--primary {
      box-shadow: 0 4px 18px -6px rgba(0, 0, 0, 0.35);
    }

    #xray-card {
      display: none;
      position: absolute;
      z-index: 30;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(400px, calc(100% - 28px));
      width: max-content;
      padding: 14px 16px 15px;
      border-radius: var(--radius-g2);
      background: rgba(252, 252, 251, 0.78);
      color: #1d1d1f;
      font-family: var(--font-sans);
      font-size: 11px;
      line-height: 1.45;
      letter-spacing: 0.01em;
      box-shadow: 0 12px 40px -16px rgba(0, 0, 0, 0.2), 0 2px 12px -4px rgba(0, 0, 0, 0.08);
      pointer-events: none;
      -webkit-font-smoothing: antialiased;
      border: 1px solid rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    #xray-card.xray-card--visible {
      display: block;
      pointer-events: auto;
    }

    .xray-card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .xray-card__title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      margin: 0;
    }

    .xray-card__lock {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: var(--radius-g2);
      background: rgba(0, 0, 0, 0.05);
      color: rgba(0, 0, 0, 0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s var(--ease), color 0.15s var(--ease);
    }

    .xray-card__lock:hover {
      background: rgba(0, 0, 0, 0.08);
      color: #1d1d1f;
    }

    .xray-card__lock[aria-pressed="true"] {
      background: rgba(0, 122, 255, 0.14);
      color: var(--accent-blue);
    }

    .xray-card__lock:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .xray-card__lock svg {
      width: 16px;
      height: 16px;
    }

    .xray-cc {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .xray-cc__grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .xray-cc__row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 28px;
    }

    .xray-cc__label {
      flex: 0 0 92px;
      color: rgba(60, 60, 67, 0.5);
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .xray-cc__field {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(0, 0, 0, 0.88);
    }

    .xray-cc__mono {
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(0, 0, 0, 0.88);
      word-break: break-all;
    }

    .xray-cc__actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .xray-cc__action {
      flex: 1;
      min-width: 0;
      font: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 10px;
      border-radius: var(--radius-g2);
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.5);
      color: rgba(0, 0, 0, 0.78);
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .xray-cc__action--paint[aria-pressed="true"] {
      border-color: rgba(0, 122, 255, 0.45);
      background: rgba(0, 122, 255, 0.12);
      color: #007aff;
    }

    .xray-cc__action--ghost[aria-pressed="true"] {
      border-color: rgba(0, 0, 0, 0.2);
      background: rgba(0, 0, 0, 0.06);
      color: #1d1d1f;
    }

    .xray-cc__action--grid[aria-pressed="true"] {
      border-color: rgba(0, 0, 0, 0.22);
      background: rgba(0, 0, 0, 0.05);
      color: #1d1d1f;
    }

    .xray-cc__action--path[aria-pressed="true"] {
      border-color: rgba(0, 122, 255, 0.45);
      background: rgba(0, 122, 255, 0.1);
      color: #007aff;
    }

    .xray-cc__verdict-split {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 4px;
    }

    .xray-cc__verdict {
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .xray-cc__verdict-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      margin: 0;
    }

    .xray-cc__verdict-main {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: rgba(0, 0, 0, 0.9);
      margin: 0;
      line-height: 1.15;
    }

    .xray-cc__verdict-main.xray-cc__verdict-main--warn {
      color: #b45309;
    }

    .xray-cc__verdict-sub {
      font-size: 10px;
      font-weight: 500;
      line-height: 1.45;
      color: rgba(60, 60, 67, 0.55);
      margin: 0;
    }

    .xray-cc__action--clear {
      border-color: rgba(0, 0, 0, 0.12);
      color: rgba(0, 0, 0, 0.75);
      background: rgba(0, 0, 0, 0.04);
    }

    .xray-cc__action--clear:hover {
      border-color: rgba(0, 0, 0, 0.28);
      background: rgba(0, 0, 0, 0.07);
    }

    .xray-cc__action:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .xray-cc__snap-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .xray-cc__snap-wrap input[type="range"] {
      flex: 1;
      min-width: 0;
      accent-color: var(--accent-blue);
      height: 4px;
    }

    .xray-cc input[type="number"] {
      width: 100%;
      max-width: 88px;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 6px;
      border-radius: var(--radius-g2);
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.85);
      color: #1d1d1f;
    }

    .xray-cc input[type="number"]:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .xray-cc__curve {
      align-self: flex-start;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-g2);
      background: rgba(0, 0, 0, 0.06);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .xray-cc__select {
      flex: 1;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 5px 8px;
      border-radius: var(--radius-g2);
      border: 1px solid rgba(0, 0, 0, 0.12);
      background-color: rgba(255, 255, 255, 0.75);
      color: #1d1d1f;
      cursor: pointer;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, rgba(0, 0, 0, 0.45) 50%),
        linear-gradient(135deg, rgba(0, 0, 0, 0.45) 50%, transparent 50%);
      background-position: calc(100% - 14px) 55%, calc(100% - 9px) 55%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .xray-cc__select:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 1px;
    }

    .xray-cc__bypass {
      align-self: stretch;
      font: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 7px 10px;
      border-radius: var(--radius-g2);
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.55);
      color: rgba(0, 0, 0, 0.78);
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .xray-cc__bypass:hover {
      border-color: rgba(0, 0, 0, 0.2);
      background: rgba(0, 0, 0, 0.04);
    }

    .xray-cc__bypass:active {
      background: rgba(0, 0, 0, 0.06);
    }

    .yinspire-toast {
      position: fixed;
      z-index: 10001;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(420px, calc(100vw - 32px));
      padding: 10px 16px;
      border-radius: var(--radius-g2);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      background: rgba(29, 29, 31, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .yinspire-toast.yinspire-toast--show {
      opacity: 1;
    }

    @media (max-width: 720px) {
      body {
        padding: 8px;
      }

      .shell {
        height: auto;
        min-height: 0;
        border-radius: var(--radius-g2);
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(160px, 0.42fr) 1fr;
      }

      .ghost-shell {
        flex-direction: row;
        width: 100%;
        height: auto;
        min-height: 0;
        box-shadow: 0 6px 24px -20px rgba(0, 0, 0, 0.12);

      function StorageManager(storageKey) {
        this.key = storageKey;
        this._timer = null;
      }
      StorageManager.prototype.scheduleSync = function () {
        var self = this;
        if (self._timer !== null) {
          window.clearTimeout(self._timer);
        }
        self._timer = window.setTimeout(function () {
          self._timer = null;
          try {
            window.localStorage.setItem(
              self.key,

      StorageManager.prototype.flushSync = function () {
        if (this._timer !== null) {
          window.clearTimeout(this._timer);
          this._timer = null;

        try {
          window.localStorage.setItem(
            this.key,
            JSON.stringify({ v: 2, changes: window.yinspire_changes, t: Date.now() })
          );

      };
      StorageManager.prototype.hydrate = function () {
        try {
          var raw = window.localStorage.getItem(this.key);
          if (!raw) {
            return;
          }
          var snap = JSON.parse(raw);
          if (!snap || !snap.changes || typeof snap.changes !== "object") {
            return;
          }
          for (var k in snap.changes) {
            if (Object.prototype.hasOwnProperty.call(snap.changes, k)) {
              window.yinspire_changes[k] = snap.changes[k];
            }
          }
        } catch (e) {}
      };
      StorageManager.prototype.clearStorage = function () {
        if (this._timer !== null) {
          window.clearTimeout(this._timer);
          this._timer = null;
        }
        try {
          window.localStorage.removeItem(this.key);
        } catch (e) {}

      function hidePlayerLeaveModal() {

      function showPlayerLeaveModal(href) {

      function wirePlayerLeaveGuard() {
        if (playerTopbar) {
          playerTopbar.addEventListener("click", function (e) {
            var a = e.target.closest("a[href]");
            if (!a || !playerTopbar.contains(a)) {
              return;
            }
            if (!isPlayerDirty()) {
              return;
            }
            e.preventDefault();
            showPlayerLeaveModal(a.href);
          });
        }
        if (playerLeaveCancel) {
          playerLeaveCancel.addEventListener("click", function () {
            hidePlayerLeaveModal();
          });
        }
        if (playerLeaveConfirm) {
          playerLeaveConfirm.addEventListener("click", function () {
            var href = pendingLeaveHref;
            hidePlayerLeaveModal();
            if (href) {
              window.location.href = href;
            }
          });
        }
        if (playerLeaveModal) {
          playerLeaveModal.addEventListener("click", function (e) {
            if (e.target && e.target.getAttribute("data-player-leave-dismiss") === "1") {
              hidePlayerLeaveModal();
            }
          });
        }
        window.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && playerLeaveModal && !playerLeaveModal.hasAttribute("hidden")) {
            hidePlayerLeaveModal();
          }
        });
        window.addEventListener("beforeunload", function (e) {
          if (!isPlayerDirty()) {
            return;
          }
          e.preventDefault();
          e.returnValue = "";

      function resolveBezierPoints(raw) {
        var orig = String(raw == null ? "" : raw)
          .split(",")[0]
          .trim();
        var s = orig.toLowerCase();
        if (!s || s === "none") {
          return null;
        }
        var map = {
          linear: [0, 0, 1, 1],
          ease: [0.25, 0.1, 0.25, 1],
          "ease-in": [0.42, 0, 1, 1],
          "ease-out": [0, 0, 0.58, 1],
          "ease-in-out": [0.42, 0, 0.58, 1]
        };
        if (map[s]) {
          var b = map[s];
          return { x1: b[0], y1: b[1], x2: b[2], y2: b[3] };
        }
        var m = orig.match(/cubic-bezier\s*\(\s*([^)]+)\)/i);
        if (!m) {
          return null;
        }
        var parts = m[1].split(/\s*,\s*/);
        if (parts.length !== 4) {
          return null;
        }
        var nums = parts.map(parseFloat);
        if (nums.some(function (n) {
          return isNaN(n);
        })) {
          return null;
        }
        return { x1: nums[0], y1: nums[1], x2: nums[2], y2: nums[3] };

      function lerp(a, b, t) {

          x1: lerp(A.x1, B.x1, u),
          y1: lerp(A.y1, B.y1, u),

          y2: lerp(A.y2, B.y2, u)

      function snappinessToBezierObj(s) {

        var o = s <= 0.5 ? lerpBezier(A, B, s / 0.5) : lerpBezier(B, C, (s - 0.5) / 0.5);

          y1: +o.y1.toFixed(3),
          x2: +o.x2.toFixed(3),
          y2: +o.y2.toFixed(3)

      function estimateSnappiness(timingStr) {
        var b = resolveBezierPoints(timingStr);
        if (!b) {
          return 0.5;
        }
        var best = 0.5;
        var bestErr = Infinity;
        var s = 0;
        while (s <= 1.001) {
          var o = snappinessToBezierObj(s);
          var err =
            Math.abs(b.x1 - o.x1) +
            Math.abs(b.y1 - o.y1) +
            Math.abs(b.x2 - o.x2) +
            Math.abs(b.y2 - o.y2);
          if (err < bestErr) {
            bestErr = err;
            best = s;
          }
          s += 0.05;
        }
        return best;
      }

      function estimateSnappinessFromPoints(tx1, ty1, tx2, ty2) {
        var best = 0.5;
        var bestErr = Infinity;
        var s = 0;
        while (s <= 1.001) {
          var o = snappinessToBezierObj(s);
          var err =
            Math.abs(o.x1 - tx1) +
            Math.abs(o.y1 - ty1) +
            Math.abs(o.x2 - tx2) +
            Math.abs(o.y2 - ty2);
          if (err < bestErr) {
            bestErr = err;
            best = s;
          }
          s += 0.05;
        }
        return best;
      }

      function drawCurve(ctx, x1, y1, x2, y2) {
        var w = 32;
        var pad = 2;
        var inner = w - pad * 2;
        var key = [x1, y1, x2, y2]
          .map(function (n) {
            return (+n).toFixed(4);
          })
          .join(",");
        if (typeof Path2D !== "undefined") {
          if (curvePathCache.key !== key || !curvePathCache.path) {
            curvePathCache.key = key;
            curvePathCache.path = new Path2D();
            var pth = curvePathCache.path;
            var t = 0;
            while (t <= 1.001) {
              var u = 1 - t;
              var x = 3 * u * u * t * x1 + 3 * u * t * t * x2 + t * t * t;
              var y = 3 * u * u * t * y1 + 3 * u * t * t * y2 + t * t * t;
              var px = pad + x * inner;
              var py = pad + (1 - y) * inner;
              if (t === 0) {
                pth.moveTo(px, py);
              } else {
                pth.lineTo(px, py);
              }
              t += 0.07;
            }
          }
        } else {
          curvePathCache.path = null;
        }
        ctx.clearRect(0, 0, w, w);
        ctx.strokeStyle = "rgba(0,0,0,0.12)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad, w - pad);
        ctx.lineTo(pad + inner, pad);
        ctx.stroke();
        ctx.strokeStyle = "rgba(0,0,0,0.82)";
        ctx.lineWidth = 1.5;
        if (curvePathCache.path) {
          ctx.stroke(curvePathCache.path);
        } else {
          ctx.beginPath();
          var t2 = 0;
          while (t2 <= 1.001) {
            var u2 = 1 - t2;
            var x2b = 3 * u2 * u2 * t2 * x1 + 3 * u2 * t2 * t2 * x2 + t2 * t2 * t2;
            var y2b = 3 * u2 * u2 * t2 * y1 + 3 * u2 * t2 * t2 * y2 + t2 * t2 * t2;
            var px2 = pad + x2b * inner;
            var py2 = pad + (1 - y2b) * inner;
            if (t2 === 0) {
              ctx.moveTo(px2, py2);
            } else {
              ctx.lineTo(px2, py2);
            }
            t2 += 0.07;
          }
          ctx.stroke();
        }
      }

        frag.push(

            (window.splitViewOn ? "Split View · Gallery slot " + (window.splitGallerySlotIndex + 1) : "Single preview") +
            "</div></div>"
        );
        var reg = window.yinspire_changes || {};
        var ks = Object.keys(reg);
        if (!ks.length) {
          frag.push('<div class="spec-row"><div class="spec-k">Scoped overrides</div><div class="spec-mono">None</div></div>');
        } else {
          var ki;
          for (ki = 0; ki < ks.length; ki++) {
            var sel = ks[ki];
            var cssLine = reg[sel];
            var dm = cssLine.match(/transition-duration:\s*([^;]+)/i);
            var tf = cssLine.match(/transition-timing-function:\s*([^;]+)/i);
            frag.push('<div class="spec-row"><div class="spec-k">Target selector</div><div class="spec-mono">' + escHtml(sel) + "</div>");
            frag.push('<div class="spec-k">Duration</div><div class="spec-mono">' + escHtml(dm ? dm[1].trim() : "—") + "</div>");
            frag.push('<div class="spec-k">Bezier</div><div class="spec-mono">' + escHtml(tf ? tf[1].trim() : "—") + "</div></div>");
          }
        }
        frag.push(
          '<div class="spec-row"><div class="spec-k">Exported</div><div class="spec-mono">' +
            escHtml(new Date().toISOString()) +
            "</div></div>"
        );
        return frag.join("");
